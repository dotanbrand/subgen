name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write  # Required for creating releases

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: SubGen ${{ steps.get_version.outputs.version }}
          body: |
            ## SubGen ${{ steps.get_version.outputs.version }}

            ### Downloads
            - **Windows**: SubGen-v${{ steps.get_version.outputs.version }}-Windows-x64.zip
            - **macOS**: SubGen-v${{ steps.get_version.outputs.version }}-macOS.tar.gz
            - **Linux**: SubGen-v${{ steps.get_version.outputs.version }}-Linux-x64.tar.gz

            ### Installation
            1. Download the appropriate file for your platform
            2. Extract the archive
            3. Run the SubGen executable
            4. On first run, select and download a Whisper model

            ### Requirements
            - No Python installation required
            - FFmpeg is bundled (no separate installation needed)
            - ~250-300 MB disk space for the application
            - Additional space for models (downloaded separately)

            ### Notes
            - **Windows**: You may see a SmartScreen warning on first run - click "More info" → "Run anyway"
            - **macOS**: Right-click the app and select "Open" on first run to bypass Gatekeeper
            - **Linux**: You may need to make the executable file executable: `chmod +x SubGen`

            See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          draft: false
          prerelease: false

  build-and-upload:
    name: Build and Upload - ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ['3.10']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install FFmpeg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install ffmpeg -y
        ffmpeg -version

    - name: Install FFmpeg (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ffmpeg
        which ffmpeg

    - name: Install FFmpeg (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        which ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        python scripts/build.py --build

    - name: Verify build
      run: |
        python scripts/build.py --verify

    - name: Package build
      run: |
        python scripts/build.py --package

    - name: Get artifact name (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $version = "${{ needs.create-release.outputs.version }}"
        $artifactName = "SubGen-v$version-Windows-x64.zip"
        Rename-Item -Path "dist/SubGen-Windows-x64.zip" -NewName $artifactName
        echo "ARTIFACT_NAME=$artifactName" >> $env:GITHUB_ENV
        echo "ARTIFACT_PATH=dist/$artifactName" >> $env:GITHUB_ENV

    - name: Get artifact name (macOS)
      if: runner.os == 'macOS'
      run: |
        version="${{ needs.create-release.outputs.version }}"
        artifact_name="SubGen-v${version}-macOS.tar.gz"
        mv dist/SubGen-macOS.tar.gz "dist/${artifact_name}"
        echo "ARTIFACT_NAME=${artifact_name}" >> $GITHUB_ENV
        echo "ARTIFACT_PATH=dist/${artifact_name}" >> $GITHUB_ENV

    - name: Get artifact name (Linux)
      if: runner.os == 'Linux'
      run: |
        version="${{ needs.create-release.outputs.version }}"
        artifact_name="SubGen-v${version}-Linux-x64.tar.gz"
        mv dist/SubGen-Linux-x64.tar.gz "dist/${artifact_name}"
        echo "ARTIFACT_NAME=${artifact_name}" >> $GITHUB_ENV
        echo "ARTIFACT_PATH=dist/${artifact_name}" >> $GITHUB_ENV

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ${{ env.ARTIFACT_PATH }}
        asset_name: ${{ env.ARTIFACT_NAME }}
        asset_content_type: application/octet-stream
